services:
  kafka:
    image: bitnami/kafka:3.6
    container_name: kafka
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      # Auto-create topics on first access
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_CFG_NUM_PARTITIONS=2
      - KAFKA_CFG_DEFAULT_REPLICATION_FACTOR=1
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 5

  # Kafka init — pre-create topics with appropriate partitions for high concurrency
  kafka-init:
    image: bitnami/kafka:3.6
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: >
      /bin/bash -c "
        echo 'Creating Kafka topics...' &&
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic order-events --partitions 4 --replication-factor 1 &&
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic pageview-events --partitions 4 --replication-factor 1 &&
        echo 'Topics created:' &&
        kafka-topics.sh --bootstrap-server kafka:9092 --list &&
        echo 'Done.'
      "

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
